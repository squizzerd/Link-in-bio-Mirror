<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background: #fafaf8;
            --color-surface: #ffffff;
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #6b6b6b;
            --color-border: #e8e8e6;
            --color-accent: #2d2d2d;
            --color-hover: #f5f5f3;
            --spacing-unit: 8px;
            --grid-gap: 4px;
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Work Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-background);
            color: var(--color-text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: calc(var(--spacing-unit) * 3) calc(var(--spacing-unit) * 4);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: rgba(250, 250, 248, 0.95);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 0.02em;
            color: var(--color-text-primary);
        }

        .header-actions {
            display: flex;
            gap: calc(var(--spacing-unit) * 2);
        }

        .btn {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            padding: calc(var(--spacing-unit) * 1.5) calc(var(--spacing-unit) * 3);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-primary);
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--color-accent);
            color: var(--color-surface);
            border-color: var(--color-accent);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--color-accent);
            color: var(--color-surface);
            border-color: var(--color-accent);
        }

        .btn-primary:hover {
            background: var(--color-text-primary);
            border-color: var(--color-text-primary);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: calc(var(--spacing-unit) * 4);
        }

        /* Mode Toggle */
        .mode-indicator {
            text-align: center;
            padding: calc(var(--spacing-unit) * 3) 0;
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--color-text-secondary);
            font-style: italic;
        }

        /* Grid */
        .grid-container {
            opacity: 0;
            animation: fadeIn 0.6s var(--transition-smooth) forwards;
            animation-delay: 0.1s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--grid-gap);
            margin-bottom: calc(var(--spacing-unit) * 6);
        }

        .grid-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--color-surface);
            cursor: pointer;
            animation: scaleIn 0.5s var(--transition-smooth) backwards;
        }

        .grid-item:nth-child(1) { animation-delay: 0.05s; }
        .grid-item:nth-child(2) { animation-delay: 0.1s; }
        .grid-item:nth-child(3) { animation-delay: 0.15s; }
        .grid-item:nth-child(4) { animation-delay: 0.2s; }
        .grid-item:nth-child(5) { animation-delay: 0.25s; }
        .grid-item:nth-child(6) { animation-delay: 0.3s; }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--transition-smooth);
        }

        .grid-item:hover img {
            transform: scale(1.05);
        }

        .grid-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0) 50%);
            opacity: 0;
            transition: opacity 0.4s var(--transition-smooth);
            display: flex;
            align-items: flex-end;
            padding: calc(var(--spacing-unit) * 2);
        }

        .grid-item:hover .grid-item-overlay {
            opacity: 1;
        }

        .grid-item-link-icon {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* Edit Mode */
        .edit-panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: calc(var(--spacing-unit) * 4);
            margin-bottom: calc(var(--spacing-unit) * 4);
            display: none;
        }

        .edit-panel.active {
            display: block;
            animation: slideDown 0.4s var(--transition-smooth);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .edit-panel-header {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 400;
            margin-bottom: calc(var(--spacing-unit) * 4);
            text-align: center;
        }

        .grid-items-list {
            display: grid;
            gap: calc(var(--spacing-unit) * 3);
        }

        .grid-item-editor {
            background: var(--color-hover);
            border: 1px solid var(--color-border);
            padding: calc(var(--spacing-unit) * 3);
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: calc(var(--spacing-unit) * 3);
            align-items: start;
            transition: all 0.3s var(--transition-smooth);
        }

        .grid-item-editor:hover {
            border-color: var(--color-accent);
        }

        .item-preview {
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--color-surface);
        }

        .item-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-fields {
            display: grid;
            gap: calc(var(--spacing-unit) * 2);
        }

        .field-group {
            display: grid;
            gap: calc(var(--spacing-unit));
        }

        .field-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
        }

        .field-input {
            font-family: var(--font-body);
            font-size: 14px;
            padding: calc(var(--spacing-unit) * 1.5);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-primary);
            transition: all 0.3s var(--transition-smooth);
        }

        .field-input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .field-actions {
            display: flex;
            gap: calc(var(--spacing-unit));
            margin-top: calc(var(--spacing-unit));
        }

        .btn-small {
            font-size: 11px;
            padding: calc(var(--spacing-unit)) calc(var(--spacing-unit) * 2);
        }

        .btn-danger {
            background: #c41e3a;
            border-color: #c41e3a;
            color: white;
        }

        .btn-danger:hover {
            background: #a01829;
            border-color: #a01829;
        }

        .add-item-section {
            margin-top: calc(var(--spacing-unit) * 4);
            padding-top: calc(var(--spacing-unit) * 4);
            border-top: 1px solid var(--color-border);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: calc(var(--spacing-unit) * 10) calc(var(--spacing-unit) * 4);
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto calc(var(--spacing-unit) * 3);
            opacity: 0.3;
        }

        .empty-state-title {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 300;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        .empty-state-text {
            color: var(--color-text-secondary);
            margin-bottom: calc(var(--spacing-unit) * 4);
        }

        /* Export/Import */
        .data-management {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: calc(var(--spacing-unit) * 3);
            margin-bottom: calc(var(--spacing-unit) * 4);
            display: none;
        }

        .data-management.active {
            display: block;
        }

        .data-management-title {
            font-family: var(--font-display);
            font-size: 20px;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        .data-textarea {
            width: 100%;
            min-height: 200px;
            font-family: monospace;
            font-size: 12px;
            padding: calc(var(--spacing-unit) * 2);
            border: 1px solid var(--color-border);
            background: var(--color-hover);
            resize: vertical;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-item-editor {
                grid-template-columns: 100px 1fr;
            }
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header-content {
                flex-direction: column;
                gap: calc(var(--spacing-unit) * 2);
                text-align: center;
            }

            .logo {
                font-size: 24px;
            }

            .grid-item-editor {
                grid-template-columns: 1fr;
            }

            .container {
                padding: calc(var(--spacing-unit) * 2);
            }
        }

        /* Accessibility */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Loading State */
        .loading {
            position: relative;
            pointer-events: none;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header" role="banner">
        <div class="header-content">
            <h1 class="logo">Gallery Grid</h1>
            <nav class="header-actions" role="navigation" aria-label="Main navigation">
                <button class="btn" id="toggleModeBtn" aria-pressed="false">
                    Edit Mode
                </button>
                <button class="btn" id="exportBtn">
                    Share Link
                </button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" role="main">
        <!-- Mode Indicator -->
        <div class="mode-indicator" id="modeIndicator" aria-live="polite">
            Preview Mode
        </div>

        <section class="data-management" id="dataManagement" aria-label="Share gallery link">
            <h2 class="data-management-title">Share Gallery Link</h2>
            <textarea 
                class="data-textarea" 
                id="dataTextarea" 
                placeholder="Your view-only gallery link will appear here..."
                aria-label="Gallery share link"></textarea>
            <div class="field-actions">
                <button class="btn btn-primary" id="copyDataBtn">
                    Copy Link to Clipboard
                </button>
                <button class="btn" id="closeDataBtn">
                    Close
                </button>
            </div>
        </section>

        <!-- Edit Panel -->
        <section class="edit-panel" id="editPanel" aria-label="Edit grid items">
            <h2 class="edit-panel-header">Manage Grid Items</h2>
            
            <div class="grid-items-list" id="gridItemsList" role="list">
                <!-- Dynamic grid item editors will be inserted here -->
            </div>

            <div class="add-item-section">
                <h3 class="edit-panel-header" style="font-size: 22px;">Add New Item</h3>
                <div class="grid-item-editor">
                    <div class="item-preview">
                        <img id="newItemPreview" src="" alt="Preview" style="display: none;">
                    </div>
                    <div class="item-fields">
                        <div class="field-group">
                            <label class="field-label" for="newImageUrl">Image URL</label>
                            <input 
                                type="url" 
                                class="field-input" 
                                id="newImageUrl" 
                                placeholder="https://example.com/image.jpg"
                                aria-required="true">
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="newAltText">Alt Text</label>
                            <input 
                                type="text" 
                                class="field-input" 
                                id="newAltText" 
                                placeholder="Describe the image"
                                aria-required="true">
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="newLinkUrl">Destination URL</label>
                            <input 
                                type="url" 
                                class="field-input" 
                                id="newLinkUrl" 
                                placeholder="https://destination.com">
                        </div>
                        <div class="field-actions">
                            <button class="btn btn-primary" id="addItemBtn">
                                Add to Grid
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Grid Container -->
        <div class="grid-container" id="gridContainer">
            <div class="grid" id="grid" role="list" aria-label="Image grid">
                <!-- Dynamic grid items will be inserted here -->
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <h2 class="empty-state-title">No Images Yet</h2>
            <p class="empty-state-text">Switch to Edit Mode to add your first grid item</p>
            <button class="btn btn-primary" onclick="document.getElementById('toggleModeBtn').click()">
                Start Adding Images
            </button>
        </div>
    </main>



    <script>
        // Application State
        let gridItems = [];
        let isEditMode = false;
        const API_URL = 'http://localhost:3000/api';

        // Fetch all grid items from the backend
        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/items`);
                if (response.ok) {
                    gridItems = await response.json();
                    renderGrid();
                } else {
                    console.error('Failed to fetch items');
                }
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Save item to backend
        async function saveItem(item, isNewItem = false) {
            try {
                const method = isNewItem ? 'POST' : 'PUT';
                const url = isNewItem ? `${API_URL}/items` : `${API_URL}/items/${item.id}`;
                
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        imageUrl: item.imageUrl,
                        altText: item.altText,
                        linkUrl: item.linkUrl
                    })
                });
                
                if (response.ok) {
                    const savedItem = await response.json();
                    if (isNewItem) {
                        gridItems.push(savedItem);
                    } else {
                        const index = gridItems.findIndex(i => i.id === item.id);
                        if (index !== -1) {
                            gridItems[index] = savedItem;
                        }
                    }
                    return true;
                } else {
                    console.error('Failed to save item');
                    return false;
                }
            } catch (error) {
                console.error('Error saving item:', error);
                return false;
            }
        }

        // Delete item from backend
        async function deleteItemFromBackend(id) {
            try {
                const response = await fetch(`${API_URL}/items/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    return true;
                } else {
                    console.error('Failed to delete item');
                    return false;
                }
            } catch (error) {
                console.error('Error deleting item:', error);
                return false;
            }
        }

        // Generate unique ID (no longer needed on frontend but kept for reference)
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // Render grid in preview mode
        function renderGrid() {
            const grid = document.getElementById('grid');
            const emptyState = document.getElementById('emptyState');
            
            if (gridItems.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            grid.innerHTML = '';
            
            gridItems.forEach((item, index) => {
                const gridItem = document.createElement('div');
                gridItem.className = 'grid-item';
                gridItem.setAttribute('role', 'listitem');
                gridItem.style.animationDelay = `${(index % 6) * 0.05}s`;
                
                const img = document.createElement('img');
                img.src = item.imageUrl;
                img.alt = item.altText;
                img.loading = index < 6 ? 'eager' : 'lazy'; // Eager load first 6 images
                
                const overlay = document.createElement('div');
                overlay.className = 'grid-item-overlay';
                overlay.innerHTML = `
                    <svg class="grid-item-link-icon" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                `;
                
                gridItem.appendChild(img);
                gridItem.appendChild(overlay);
                
                // Click handler
                gridItem.addEventListener('click', () => {
                    if (item.linkUrl) {
                        window.open(item.linkUrl, '_blank', 'noopener,noreferrer');
                    }
                });
                
                // Keyboard navigation
                gridItem.setAttribute('tabindex', '0');
                gridItem.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        gridItem.click();
                    }
                });
                
                grid.appendChild(gridItem);
            });
        }

        // Render edit panel
        function renderEditPanel() {
            const listContainer = document.getElementById('gridItemsList');
            listContainer.innerHTML = '';
            
            gridItems.forEach((item) => {
                const editor = createItemEditor(item);
                listContainer.appendChild(editor);
            });
        }

        // Create item editor element
        function createItemEditor(item) {
            const editor = document.createElement('div');
            editor.className = 'grid-item-editor';
            editor.setAttribute('role', 'listitem');
            
            editor.innerHTML = `
                <div class="item-preview">
                    <img src="${item.imageUrl}" alt="${item.altText}">
                </div>
                <div class="item-fields">
                    <div class="field-group">
                        <label class="field-label">Image URL</label>
                        <input 
                            type="url" 
                            class="field-input" 
                            value="${item.imageUrl}" 
                            data-field="imageUrl"
                            data-id="${item.id}">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Alt Text</label>
                        <input 
                            type="text" 
                            class="field-input" 
                            value="${item.altText}" 
                            data-field="altText"
                            data-id="${item.id}">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Destination URL</label>
                        <input 
                            type="url" 
                            class="field-input" 
                            value="${item.linkUrl}" 
                            data-field="linkUrl"
                            data-id="${item.id}">
                    </div>
                    <div class="field-actions">
                        <button class="btn btn-small btn-danger" data-action="delete" data-id="${item.id}">
                            Delete
                        </button>
                        <button class="btn btn-small" data-action="moveUp" data-id="${item.id}">
                            ↑ Move Up
                        </button>
                        <button class="btn btn-small" data-action="moveDown" data-id="${item.id}">
                            ↓ Move Down
                        </button>
                    </div>
                </div>
            `;
            
            // Add event listeners for inputs
            const inputs = editor.querySelectorAll('.field-input');
            inputs.forEach(input => {
                input.addEventListener('change', handleItemUpdate);
            });
            
            // Add event listeners for buttons
            const buttons = editor.querySelectorAll('[data-action]');
            buttons.forEach(button => {
                button.addEventListener('click', handleItemAction);
            });
            
            return editor;
        }

        // Handle item update
        async function handleItemUpdate(e) {
            const id = e.target.dataset.id;
            const field = e.target.dataset.field;
            const value = e.target.value;
            
            const item = gridItems.find(i => i.id === id);
            if (item) {
                item[field] = value;
                renderGrid();
                
                // Save to backend
                await saveItem(item, false);
                
                // Update preview image if URL changed
                if (field === 'imageUrl') {
                    const preview = e.target.closest('.grid-item-editor').querySelector('.item-preview img');
                    preview.src = value;
                }
            }
        }

        // Handle item actions (delete, move)
        async function handleItemAction(e) {
            const action = e.target.dataset.action;
            const id = e.target.dataset.id;
            const index = gridItems.findIndex(i => i.id === id);
            
            if (index === -1) return;
            
            switch (action) {
                case 'delete':
                    if (confirm('Are you sure you want to delete this item?')) {
                        const deleted = await deleteItemFromBackend(id);
                        if (deleted) {
                            gridItems.splice(index, 1);
                            renderEditPanel();
                            renderGrid();
                        }
                    }
                    break;
                    
                case 'moveUp':
                    if (index > 0) {
                        [gridItems[index], gridItems[index - 1]] = [gridItems[index - 1], gridItems[index]];
                        renderEditPanel();
                        renderGrid();
                    }
                    break;
                    
                case 'moveDown':
                    if (index < gridItems.length - 1) {
                        [gridItems[index], gridItems[index + 1]] = [gridItems[index + 1], gridItems[index]];
                        renderEditPanel();
                        renderGrid();
                    }
                    break;
            }
        }

        // Add new item
        async function addNewItem() {
            const imageUrl = document.getElementById('newImageUrl').value.trim();
            const altText = document.getElementById('newAltText').value.trim();
            const linkUrl = document.getElementById('newLinkUrl').value.trim();
            
            if (!imageUrl || !altText) {
                alert('Please provide at least an image URL and alt text.');
                return;
            }
            
            const newItem = {
                imageUrl,
                altText,
                linkUrl
            };
            
            const saved = await saveItem(newItem, true);
            if (saved) {
                renderEditPanel();
                renderGrid();
                
                // Clear form
                document.getElementById('newImageUrl').value = '';
                document.getElementById('newAltText').value = '';
                document.getElementById('newLinkUrl').value = '';
                document.getElementById('newItemPreview').style.display = 'none';
            } else {
                alert('Failed to add item. Please try again.');
            }
        }

        // Preview new item image
        document.getElementById('newImageUrl').addEventListener('input', (e) => {
            const preview = document.getElementById('newItemPreview');
            if (e.target.value.trim()) {
                preview.src = e.target.value;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        // Toggle edit mode
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const editPanel = document.getElementById('editPanel');
            const modeIndicator = document.getElementById('modeIndicator');
            const toggleBtn = document.getElementById('toggleModeBtn');
            
            if (isEditMode) {
                editPanel.classList.add('active');
                modeIndicator.textContent = 'Edit Mode';
                toggleBtn.textContent = 'Preview Mode';
                toggleBtn.setAttribute('aria-pressed', 'true');
                renderEditPanel();
            } else {
                editPanel.classList.remove('active');
                modeIndicator.textContent = 'Preview Mode';
                toggleBtn.textContent = 'Edit Mode';
                toggleBtn.setAttribute('aria-pressed', 'false');
            }
        }

        // Export data - now generates view-only link
        function exportData() {
            const viewOnlyUrl = `${window.location.origin}/view`;
            const dataManagement = document.getElementById('dataManagement');
            const dataTextarea = document.getElementById('dataTextarea');
            
            dataTextarea.value = `Your view-only gallery link:\n${viewOnlyUrl}\n\nThis link can be shared in your social media bio or anywhere you want to display your gallery.`;
            dataManagement.classList.add('active');
        }

        // Copy to clipboard
        async function copyToClipboard() {
            const dataTextarea = document.getElementById('dataTextarea');
            try {
                await navigator.clipboard.writeText(dataTextarea.value);
                alert('Link copied to clipboard!');
            } catch (e) {
                // Fallback for older browsers
                dataTextarea.select();
                document.execCommand('copy');
                alert('Link copied to clipboard!');
            }
        }

        // Event Listeners
        document.getElementById('toggleModeBtn').addEventListener('click', toggleEditMode);
        document.getElementById('addItemBtn').addEventListener('click', addNewItem);
        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('copyDataBtn').addEventListener('click', copyToClipboard);
        document.getElementById('closeDataBtn').addEventListener('click', () => {
            document.getElementById('dataManagement').classList.remove('active');
        });

        // Initialize app
        fetchData();
    </script>
</body>
</html>
